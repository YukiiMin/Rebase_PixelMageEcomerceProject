spring.application.name=PixelMageEcomerceProject
server.forward-headers-strategy=framework
server.port=${SERVER_PORT:8080}

# Bắt buộc load file .env trước tiên
spring.config.import=optional:file:.env

# Database Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Redis Configuration
spring.data.redis.url=${REDIS_URL}
spring.data.redis.timeout=2000ms
spring.cache.type=redis

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=true
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:Data-init.sql
spring.jpa.defer-datasource-initialization=true

# JWT Settings
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# App URLs
app.frontend.url=${FRONTEND_URL}
app.dev-frontend.url=${DEV_FRONTEND_URL}
app.backend.url=${BACKEND_URL}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
google.client-id=${GOOGLE_CLIENT_ID}
google.mobile-client-id=${GOOGLE_MOBILE_CLIENT_ID}


# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.url=${CLOUDINARY_URL}

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.activated=true
springdoc.show-actuator=false
springdoc.paths-to-match=/**
springdoc.packages-to-scan=com.example.PixelMageEcomerceProject.controller

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APPe_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Payments
payment.gateway.active=sepay
sepay.api-key=${SEPAY_API_KEY}
sepay.merchant-id=${SEPAY_MERCHANT_ID}
sepay.bank-account=${SEPAY_BANK_ACCOUNT}
sepay.bank-code=${SEPAY_BANK_CODE}
sepay.webhook-secret=${SEPAY_WEBHOOK_SECRET}
sepay.webhook-url=${BACKEND_URL}/api/payments/webhook/sepay

vnpay.tmn-code=${VNPAY_TMN_CODE:U40MCGMP}
vnpay.hash-secret=${VNPAY_HASH_SECRET:0D4ONYKD46KEGRHNDD07L0LO6F5Y1TJ4}
vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL}
vnpay.ipn-url=${BACKEND_URL}/api/payments/webhook/vnpay

stripe.api.public-key=${STRIPE_PUBLIC_KEY}
stripe.api.secret-key=${STRIPE_SECRET_KEY}
